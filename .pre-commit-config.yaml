# Run `pre-commit run --all-files` for a full check.
# Run `pre-commit autoupdate` periodically to refresh pinned versions.

repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Python tools run via uv so they use the versions pinned in uv.lock.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        files: ^(src|tests)/
        args: [src/psd_tools, tests]
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Markdown formatting (pure Python, no Node.js required)
  # mdformat-gfm adds GitHub-Flavored Markdown support (tables, task lists)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm==1.0.0
        # Exclude GitHub issue templates and Claude Code skills — they use YAML front matter
        # delimited by `---` which mdformat incorrectly treats as a thematic break.
        files: ^(?!\.venv/|build/|dist/|\.github/ISSUE_TEMPLATE/|\.claude/skills/).*\.md$

  # ---------------------------------------------------------------------------
  # RST: sphinx-lint (linter — no mature RST formatter exists)
  # Checks for mismatched backticks, bad cross-reference syntax, malformed
  # directives, and other Sphinx RST issues.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/sphinx-contrib/sphinx-lint
    rev: v1.0.2
    hooks:
      - id: sphinx-lint
        files: ^docs/.*\.rst$
